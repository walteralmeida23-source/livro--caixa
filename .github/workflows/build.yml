name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Instalar EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Obter e descarregar APK
        run: |
          sleep 30
          URL=$(eas build:list --platform android --limit 1 --json --non-interactive | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d)[0].artifacts.buildUrl)}catch(e){console.log('pending')}})")
          echo "URL encontrado: $URL"
          if [ "$URL" != "pending" ] && [ ! -z "$URL" ]; then
            curl -L "$URL" -o livro-caixa.apk
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: livro-caixa-apk
          path: livro-caixa.apk
          retention-days: 7
        continue-on-error: true
